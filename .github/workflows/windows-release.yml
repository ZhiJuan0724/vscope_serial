name: Windows CI Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Analyze and test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Check test tool syntax
        run: python -m py_compile test_tools/zobow_device.py

  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    timeout-minutes: 45
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Verify native serial reader DLL
        shell: pwsh
        run: |
          $dll = "build/windows/x64/runner/Release/native_serial_reader.dll"
          if (-not (Test-Path $dll)) {
            throw "Missing native_serial_reader.dll in release bundle"
          }

      - name: Package Windows bundle
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -ne "tag") {
            $version = "${{ github.sha }}"
          }
          $packageName = "vscope_serial-windows-$version.zip"
          Compress-Archive `
            -Path "build/windows/x64/runner/Release/*" `
            -DestinationPath $packageName `
            -Force
          "PACKAGE_NAME=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscope_serial-windows
          path: ${{ env.PACKAGE_NAME }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: windows-latest
    needs: build-windows
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: vscope_serial-windows
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
